name: tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      # Install uv via its official curl installer — sidesteps the
      # astral-sh/setup-uv JS-action Node-20 deprecation noise.
      - name: install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: cache uv data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: install python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: install dependencies
        run: uv sync --extra dev

      - name: ruff format check
        run: uv run ruff format --check src tests examples

      - name: ruff lint
        run: uv run ruff check src tests examples

      - name: pytest
        env:
          # Force the test embedder so CI never downloads the fastembed model.
          # (conftest.py already autouse-sets this, but env-wide belt-and-braces.)
          A5C_ENGRAM_EMBEDDER: fake
        run: uv run pytest -q --tb=short
