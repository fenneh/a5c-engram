name: tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force JS actions onto Node 24 even when the upstream action is still
# packaged for Node 20 (e.g. astral-sh/setup-uv as of late 2025). Silences
# GitHub's deprecation annotation; harmless when actions catch up.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: set up python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: install dependencies
        run: uv sync --extra dev

      - name: ruff format check
        run: uv run ruff format --check src tests examples

      - name: ruff lint
        run: uv run ruff check src tests examples

      - name: pytest
        env:
          # Force the test embedder so CI never downloads the fastembed model.
          # (conftest.py already autouse-sets this, but env-wide belt-and-braces.)
          A5C_ENGRAM_EMBEDDER: fake
        run: uv run pytest -q --tb=short
