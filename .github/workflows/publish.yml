name: publish

# Fires on a pushed tag like v0.1.0. Uses PyPI trusted publishing — no token
# needed once you've configured the PyPI project to trust this repo + workflow.
# https://docs.pypi.org/trusted-publishers/
#
# To ship a release:
#   1. Bump version in pyproject.toml.
#   2. git tag v0.1.1 && git push --tags
#   3. The job below builds the sdist + wheel and uploads to PyPI.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: build sdist + wheel
        run: uv build

      - name: upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/a5c-engram
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
